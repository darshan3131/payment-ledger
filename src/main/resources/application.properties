spring.application.name=payment-ledger

# ?? DATABASE ?????????????????????????????????????????????
# CRITICAL: Removed fallback (localhost).
# If DB_URL is missing, app will FAIL FAST instead of silently using wrong DB.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? JPA ??????????????????????????????????????????????????
# ddl-auto=validate ensures schema correctness (Flyway handles migrations)
spring.jpa.hibernate.ddl-auto=validate

# Disable SQL logs in production via env (default = false now)
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ?? Flyway ???????????????????????????????????????????????
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# ?? Redis ????????????????????????????????????????????????
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=${REDIS_SSL:true}

# ?? Kafka ???????????????????????????????????????????????
# Configurable via env — defaults to localhost (no-op if no broker exists).
# The Outbox relay silently retries; app continues to function without Kafka.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
# Silence Kafka client retry noise — only show real errors, not connection retries
logging.level.org.apache.kafka=ERROR
logging.level.kafka=ERROR
logging.level.org.apache.kafka.clients.NetworkClient=ERROR
logging.level.org.apache.kafka.clients.producer.ProducerConfig=ERROR

# ?? Server ???????????????????????????????????????????????
server.port=${PORT:8080}

# ?? JWT ??????????????????????????????????????????????????
# Must be provided via env in production
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ?? OTP Dev Mode ?????????????????????????????????????????
# false = production mode (no hardcoded OTP)
otp.dev-mode=${OTP_DEV_MODE:false}

# ?? Twilio (optional, unused in your setup) ??????????????
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from-number=${TWILIO_FROM_NUMBER:}

# ?? Payment Config ???????????????????????????????????????
payment.high-value-threshold=1000000

# ?? Actuator ?????????????????????????????????????????????
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
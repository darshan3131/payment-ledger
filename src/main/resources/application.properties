spring.application.name=payment-ledger

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/payment_ledger_db?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:my-secret-pw}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
# ddl-auto=validate: Hibernate checks that the DB schema matches entity definitions at startup.
# If a column is missing or has the wrong type → startup FAILS immediately (safe, fast feedback).
# Schema changes are now Flyway's job (V2__, V3__, …) — never touch ddl-auto=update again.
spring.jpa.hibernate.ddl-auto=validate
# show-sql: set SPRING_JPA_SHOW_SQL=false in Render env to suppress SQL log noise in production.
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway — versioned schema migrations
# enabled=true          : Flyway runs on every startup, applies any pending V*.sql scripts.
# baseline-on-migrate   : On an existing DB with no flyway_schema_history table, Flyway marks
#                         V1 as "already applied" and does NOT execute V1__baseline.sql.
#                         On a fresh DB (CI / new dev box) it runs V1 in full.
# baseline-version=1    : The version to use as the baseline marker.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

# Kafka
# bootstrap-servers: the Kafka broker address. 9092 is the default port.
spring.kafka.bootstrap-servers=localhost:9092

# Producer serializers: convert Java String → bytes when sending to Kafka
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Consumer deserializers: convert bytes → Java String when reading from Kafka
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# earliest: if this consumer group has never run before, start reading from
# the very beginning of the topic — don't skip messages published before first connect.
spring.kafka.consumer.auto-offset-reset=earliest


# Server
server.port=8080

# JWT
# Secret must be at least 32 characters (256 bits) for HS256 algorithm.
# In production: use environment variable, never commit the real secret to git.
jwt.secret=${JWT_SECRET:payment-ledger-super-secret-key-minimum-32-chars-long-dev-only}
# 86400000 ms = 24 hours
jwt.expiration=86400000

# ── OTP Dev Mode ─────────────────────────────────────────────────────────────
# true  = all OTPs are hardcoded to 123456 (no SMS needed — for local dev/testing)
# false = real random OTP generated and sent via Twilio SMS (for production)
otp.dev-mode=${OTP_DEV_MODE:true}

# ── Twilio SMS (for OTP / forgot-password) ────────────────────────────────────
# Leave blank in development — OTP will be printed to the Spring Boot console log.
# To enable real SMS:
#   1. Sign up at https://www.twilio.com (free trial gives ~15 USD credit)
#   2. Get your Account SID and Auth Token from the Twilio Console dashboard
#   3. Buy or use a trial phone number (From Number) — format: +1XXXXXXXXXX
#   4. For India (A2P SMS): use a Twilio India-registered number or alphanumeric sender
# In production: set these as environment variables, never hardcode credentials in git.
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from-number=${TWILIO_FROM_NUMBER:}

# High-value transfer threshold — transfers AT OR ABOVE this amount (in paise) require OTP.
# Default: 1000000 paise = ₹10,000
payment.high-value-threshold=1000000

# ── Actuator ─────────────────────────────────────────────────────────────────
# Expose only /actuator/health — used by Render for health checks and uptime monitoring.
# All other actuator endpoints (metrics, env, beans) remain locked.
# /health is explicitly permitted in SecurityConfig with no JWT required.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never